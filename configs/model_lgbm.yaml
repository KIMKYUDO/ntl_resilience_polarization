model:
  name: lightgbm_tabular_baseline
  objective: binary
  target: y_delayed_slowest_20pct
  include_sequence_summary_features: true
  params:
    n_estimators: 1200
    learning_rate: 0.03
    num_leaves: 63
    max_depth: -1
    min_child_samples: 30
    subsample: 0.85
    colsample_bytree: 0.85
    reg_alpha: 0.1
    reg_lambda: 1.0
    class_weight: balanced
    random_state: 42
